name: Saksbehandler - Bygg og deploy

on:
  push:
    branches:
      - 'main'
    paths:
      - 'saksbehandler/**'
      - 'komponenter/**'
  workflow_dispatch:

jobs:
  bygg:
    name: Bygg og deploy
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Sett opp pnpm
        uses: pnpm/action-setup@v4
      - name: Konfigurer Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Konfigurer pnpm
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken $NODE_AUTH_TOKEN
          pnpm config set engine-strict true
      - name: Frontend pnpm install
        run: pnpm install --frozen-lockfile
      - name: Server pnpm install
        run: pnpm install --ignore-workspace --frozen-lockfile
        working-directory: saksbehandler/server
      - name: Prettier
        run: pnpm run prettier
      - name: Linting
        run: pnpm run lint
      - name: Komponenter - bygg
        run: pnpm --filter tiltak-refusjon-komponenter run build
      - name: Test og bygg
        run: pnpm --filter tiltak-refusjon-saksbehandler run test-and-build
      - name: Bygg - Server
        run: pnpm run build
        working-directory: saksbehandler/server
      - name: Push docker image to GAR
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: arbeidsgiver
          image_suffix: saksbehandler
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          dockerfile: saksbehandler/Dockerfile

  deploy-dev:
    name: Deploy til dev-gcp
    runs-on: ubuntu-latest
    needs: bygg
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Deploy til dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/saksbehandler/nais-dev-gcp.yml
          VAR: image=${{ needs.bygg.outputs.image }}

  deploy-labs:
    name: Deploy til dev-gcp (tidligere labs)
    runs-on: ubuntu-latest
    needs: bygg
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Deploy til dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/saksbehandler/nais-dev-gcp-labs.yml
          VAR: image=${{ needs.bygg.outputs.image }}

  deploy-prod:
    name: Deploy til prod-gcp
    runs-on: ubuntu-latest
    needs: [bygg, deploy-dev, deploy-labs]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Deploy til prod-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/saksbehandler/nais-prod-gcp.yml
          VAR: image=${{ needs.bygg.outputs.image }}
