name: Saksbehandler - Bygg og deploy storybook

on:
  push:
    branches:
      - 'main'
    paths:
      - 'saksbehandler/**'
      - 'komponenter/**'
  workflow_dispatch:

jobs:
  bygg:
    permissions:
      contents: read
      id-token: write
    name: Bygg og deploy
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Sett opp pnpm
        uses: pnpm/action-setup@v4
      - name: Konfigurer Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Konfigurer pnpm
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken $NODE_AUTH_TOKEN
          pnpm config set engine-strict true
      - name: Frontend pnpm install
        run: pnpm install --frozen-lockfile
      - name: Frontend - test, lint og bygg
        run: pnpm --filter tiltak-refusjon-saksbehandler run build-storybook
      - name: Push docker image to GAR
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: team-tiltak
          image_suffix: storybook
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          dockerfile: saksbehandler/StorybookDockerfile

  deploy-dev:
    name: Deploy til dev-gcp
    runs-on: ubuntu-latest
    needs: bygg
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
      - name: Deploy til dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/saksbehandler/nais-dev-gcp-storybook.yml
          VAR: image=${{ needs.bygg.outputs.image }}
